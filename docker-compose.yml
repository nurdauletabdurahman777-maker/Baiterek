services:
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: baiterek, POSTGRES_USER: baiterek, POSTGRES_PASSWORD: baiterek_demo}
    ports: ["5432:5432"]
    volumes: [baiterek_pg:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U baiterek"], interval: 5s, timeout: 3s, retries: 10}
  backend:
    build: ./backend
    environment: {DATABASE_URL: "postgresql+psycopg://baiterek:baiterek_demo@db:5432/baiterek", FRONTEND_URL: "http://localhost:3000", DEMO_MODE: "true"}
    ports: ["8000:8000"]
    depends_on: {db: {condition: service_healthy}}
  frontend:
    build: ./frontend
    environment: {NEXT_PUBLIC_API_URL: "http://localhost:8000"}
    ports: ["3000:3000"]
    depends_on: [backend]
volumes: {baiterek_pg: {}}

